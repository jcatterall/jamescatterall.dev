/* ── DEMO FILM PALETTES ── */
const DEMO_FILMS = [
  {
    id: 'br2049',
    label: 'Blade Runner 2049',
    duration: 9720, // 162 min
    palette: (t) => {
      // Teal-orange dominant, cold exterior, warm interior, deep blue skyline
      const act = t < 0.25 ? 0 : t < 0.55 ? 1 : t < 0.78 ? 2 : 3;
      const n = Math.sin(t * 180 + act) * 0.12 + Math.sin(t * 40) * 0.06;
      if (act === 0) return hsl(195 + n * 20, 45 + n * 10, 18 + n * 8);  // cold teal open
      if (act === 1) return hsl(28 + n * 30,  60 + n * 15, 22 + n * 10); // amber city
      if (act === 2) return hsl(210 + n * 25, 50 + n * 10, 12 + n * 6);  // deep blue/grey
      return hsl(16 + n * 40, 65 + n * 10, 28 + n * 12);                 // warm climax
    },
  },
  {
    id: 'moonlight',
    label: 'Moonlight',
    duration: 6540, // 109 min
    palette: (t) => {
      const act = t < 0.33 ? 0 : t < 0.66 ? 1 : 2;
      const n = Math.sin(t * 120) * 0.1 + Math.sin(t * 30) * 0.05;
      if (act === 0) return hsl(220 + n * 30, 55, 22 + n * 8);   // moonlit deep blue
      if (act === 1) return hsl(200 + n * 20, 40, 30 + n * 10);  // humid grey-blue
      return hsl(240 + n * 25, 35 + n * 10, 18 + n * 6);         // cool resolution
    },
  },
  {
    id: 'lalaland',
    label: 'La La Land',
    duration: 7860, // 131 min
    palette: (t) => {
      // Vibrant saturated, pink/lavender, golden hour
      const n = Math.sin(t * 200) * 0.1 + Math.sin(t * 50) * 0.06;
      const base = (t * 320 + 40) % 360;
      return hsl(base + n * 30, 65 + n * 15, 52 + n * 10);
    },
  },
  {
    id: 'fury',
    label: 'Mad Max: Fury Road',
    duration: 7200, // 120 min
    palette: (t) => {
      // Harsh orange desert, teal correction, explosive saturation
      const n = Math.sin(t * 250) * 0.15 + Math.sin(t * 60) * 0.08;
      const isTeal = Math.sin(t * 8) > 0.7;
      if (isTeal) return hsl(185 + n * 20, 50 + n * 10, 28 + n * 10);
      return hsl(24 + n * 25, 80 + n * 10, 38 + n * 12);
    },
  },
  {
    id: 'parasite',
    label: 'Parasite',
    duration: 8340, // 139 min
    palette: (t) => {
      const act = t < 0.4 ? 0 : t < 0.7 ? 1 : 2;
      const n = Math.sin(t * 160) * 0.08;
      if (act === 0) return hsl(55 + n * 20, 18 + n * 8, 42 + n * 10);   // warm clinical
      if (act === 1) return hsl(220 + n * 20, 20 + n * 10, 22 + n * 8);  // cold descent
      return hsl(0 + n * 20, 55 + n * 15, 20 + n * 8);                   // dark red
    },
  },
];

function hsl(h, s, l) {
  // Convert HSL to hex
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s)) / 100;
  l = Math.max(0, Math.min(100, l)) / 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r, g, b;
  if (h < 60)      { r=c; g=x; b=0; }
  else if (h < 120){ r=x; g=c; b=0; }
  else if (h < 180){ r=0; g=c; b=x; }
  else if (h < 240){ r=0; g=x; b=c; }
  else if (h < 300){ r=x; g=0; b=c; }
  else             { r=c; g=0; b=x; }
  const toHex = v => Math.round((v+m)*255).toString(16).padStart(2,'0');
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
}

        {!isProcessing ? (

/* ── BARCODE CANVAS ── */
const BarcodeCanvas = ({ filmId, settings, status, onComplete }) => {
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const cancelledRef = React.useRef(false);
  const [progress, setProgress] = React.useState({ current: 0, total: 0 });
  const [dominantColors, setDominantColors] = React.useState([]);

  React.useEffect(() => {
    if (status !== 'processing' || !filmId) return;
    cancelledRef.current = false;

    const film = DEMO_FILMS.find(f => f.id === filmId);
    if (!film) return;

    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const totalFrames = Math.floor(film.duration * settings.sampleRate);
    const barH = settings.barHeight;
    const canvasH = Math.min(totalFrames * barH, 6000);
    const effectiveBarH = canvasH / totalFrames;

    canvas.width = settings.outputWidth;
    canvas.height = Math.max(canvasH, 1);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    setProgress({ current: 0, total: totalFrames });
    setDominantColors([]);

    let frameIdx = 0;
    const BATCH = 8; // frames per animation tick — controls speed

    const tick = () => {
      if (cancelledRef.current) return;
      for (let b = 0; b < BATCH && frameIdx < totalFrames; b++, frameIdx++) {
        const t = frameIdx / totalFrames;
        const color = film.palette(t);

        if (settings.paletteDepth === 1) {
          ctx.fillStyle = color;
          ctx.fillRect(0, frameIdx * effectiveBarH, settings.outputWidth, Math.ceil(effectiveBarH));
        } else {
          // Subdivide bar into palette segments
          const segW = settings.outputWidth / settings.paletteDepth;
          for (let p = 0; p < settings.paletteDepth; p++) {
            const pt = (t + p * 0.07) % 1;
            ctx.fillStyle = film.palette(pt);
            ctx.fillRect(p * segW, frameIdx * effectiveBarH, segW, Math.ceil(effectiveBarH));
          }
        }

        // Timestamp overlay — every 10 minutes
        if (settings.timestampOverlay && frameIdx % Math.floor(600 * settings.sampleRate) === 0 && frameIdx > 0) {
          const mins = Math.floor((frameIdx / settings.sampleRate) / 60);
          ctx.fillStyle = 'rgba(255,255,255,0.45)';
          ctx.font = `9px 'Space Mono', monospace`;
          ctx.fillText(`${mins}m`, settings.outputWidth - 28, frameIdx * effectiveBarH + 10);
        }

        setDominantColors(prev => {
          const c = [...prev];
          if (frameIdx % Math.ceil(totalFrames / 12) === 0) c.push(color);
          return c;
        });
      }

      setProgress({ current: frameIdx, total: totalFrames });

      if (frameIdx < totalFrames) {
        rafRef.current = requestAnimationFrame(tick);
      } else {
        onComplete();
      }
    };

    rafRef.current = requestAnimationFrame(tick);
    return () => {
      cancelledRef.current = true;
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
    };
  }, [status, filmId]);

  const pct = progress.total > 0 ? Math.round((progress.current / progress.total) * 100) : 0;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: nd.black }}>
      {/* Canvas scroll area */}
      <div style={{ flex: 1, overflow: 'auto', display: 'flex', justifyContent: 'center', alignItems: 'flex-start', padding: 24 }}>
        <canvas
          ref={canvasRef}
          style={{
            display: 'block',
            maxWidth: '100%',
            height: 'auto',
            imageRendering: 'pixelated',
          }}
        />
      </div>

      {/* Progress bar + stats */}
      {(status === 'processing' || status === 'complete') && (
        <div style={{ borderTop: `1px solid ${nd.border}`, background: nd.bg, flexShrink: 0 }}>
          {/* Thin progress bar */}
          <div style={{ height: 2, background: nd.border, position: 'relative' }}>
            <div style={{
              position: 'absolute', left: 0, top: 0, bottom: 0,
              width: `${pct}%`,
              background: status === 'complete' ? nd.success : nd.accent,
              transition: 'width 100ms linear, background 300ms ease-out',
            }} />
          </div>

          <div style={{ padding: '10px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontFamily: nd.mono, fontSize: 10, color: status === 'complete' ? nd.success : nd.textMid, letterSpacing: '0.05em' }}>
              {status === 'complete'
                ? `COMPLETE — ${progress.total} FRAMES PROCESSED`
                : `PROCESSING — ${progress.current.toLocaleString()} / ${progress.total.toLocaleString()} FRAMES — ${pct}%`
              }
            </div>

            {/* Dominant color swatches */}
            <div style={{ display: 'flex', gap: 3, alignItems: 'center' }}>
              <span style={{ fontFamily: nd.mono, fontSize: 9, color: nd.textDisabled, letterSpacing: '0.06em', marginRight: 6 }}>PALETTE</span>
              {dominantColors.map((c, i) => (
                <div key={i} style={{ width: 12, height: 12, background: c }} title={c} />
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── APP ── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "defaultFilm": "br2049"
}/*EDITMODE-END*/;

const DEFAULT_SETTINGS = {
  sampleRate: 1, barHeight: 2, outputWidth: 800,
  paletteDepth: 1, timestampOverlay: false,
};

const App = () => {
  const [status, setStatus] = React.useState('idle');
  const [settings, setSettings] = React.useState(DEFAULT_SETTINGS);
  const [activeFilm, setActiveFilm] = React.useState(null);
  const [tweakOpen, setTweakOpen] = React.useState(false);
  const [tweaks] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const h = e => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const handleStart = (filmId) => {
    setActiveFilm(filmId);
    setStatus('processing');
  };

  const handleCancel = () => setStatus('idle');
  const handleComplete = () => setStatus('complete');
  const handleExport = (type) => {
    alert(`${type.toUpperCase()} export — in production this would download the canvas as a ${type === 'css' ? 'linear-gradient string' : type.toUpperCase()} file.`);
  };

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: nd.bg, overflow: 'hidden' }}>
      <Nav />
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <Sidebar
          settings={settings}
          setSettings={setSettings}
          status={status}
          onStart={handleStart}
          onCancel={handleCancel}
          onExport={handleExport}
          film={activeFilm ? DEMO_FILMS.find(f => f.id === activeFilm) : null}
          hasResult={status === 'complete'}
        />

        {status === 'idle'
          ? <IdleScreen onStart={handleStart} />
          : <BarcodeCanvas
              filmId={activeFilm}
              settings={settings}
              status={status}
              onComplete={handleComplete}
            />
        }
      </div>

      {/* Tweaks */}
      {tweakOpen && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
          background: nd.surface, border: `1px solid ${nd.borderVisible}`,
          padding: 20, width: 220, display: 'flex', flexDirection: 'column', gap: 14,
        }}>
          <div style={{ fontFamily: nd.mono, fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: nd.textMid }}>Tweaks</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <div style={{ fontFamily: nd.mono, fontSize: 9, color: nd.textSecondary, letterSpacing: '0.07em', marginBottom: 4 }}>LOAD DEMO</div>
            {DEMO_FILMS.map(f => (
              <button key={f.id} onClick={() => handleStart(f.id)} style={{
                textAlign: 'left', padding: '6px 10px',
                border: `1px solid ${activeFilm === f.id ? nd.textPrimary : nd.border}`,
                background: 'transparent', color: activeFilm === f.id ? nd.textPrimary : nd.textSecondary,
                fontFamily: nd.mono, fontSize: 9, cursor: 'pointer', letterSpacing: '0.04em',
              }}>{f.label}</button>
            ))}
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <div style={{ fontFamily: nd.mono, fontSize: 9, color: nd.textSecondary, letterSpacing: '0.07em', marginBottom: 4 }}>RESET</div>
            <button onClick={() => { setStatus('idle'); setActiveFilm(null); }} style={{
              padding: '7px', border: `1px solid ${nd.border}`,
              background: 'transparent', color: nd.textMid,
              fontFamily: nd.mono, fontSize: 9, cursor: 'pointer',
            }}>BACK TO IDLE</button>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
