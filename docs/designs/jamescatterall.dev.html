<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James Catterall — Software Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #000000;
    color: #E8E8E8;
    font-family: 'Space Mono', 'Courier New', monospace;
    -webkit-font-smoothing: antialiased;
  }

  body {
    /* Scanline texture */
    background-image: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.03) 0px,
      rgba(0,0,0,0.03) 1px,
      transparent 1px,
      transparent 3px
    );
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #222; }

  a { color: inherit; text-decoration: none; }
  button { font-family: 'Space Mono', monospace; cursor: pointer; }

  /* Hero cursor — hero name only */
  .hero-cursor {
    display: inline-block;
    color: #D71921;
    animation: heroCursorBlink 1400ms step-end infinite;
    font-family: 'Space Mono', monospace;
    margin-left: 2px;
    font-size: 0.75em;
    vertical-align: text-bottom;
    position: relative;
    top: -4px;
  }

  @keyframes heroCursorBlink {
    0%, 49%  { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* Work rows */
  .work-row {
    position: relative;
    padding: 16px 24px 16px 20px;
    border-bottom: 1px solid #1A1A1A;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    transition: background 150ms ease-out;
    cursor: default;
  }
  .work-row::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: #D71921;
    opacity: 0;
    transition: opacity 150ms ease-out;
  }
  .work-row:hover { background: #111111; }
  .work-row:hover::before { opacity: 1; }
  .work-row:hover .row-title { color: #FFFFFF; }
  .work-row:hover .row-arrow { color: #FFFFFF; }

  /* Contact rows */
  .contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #1A1A1A;
    transition: opacity 150ms ease-out;
    cursor: pointer;
  }
  .contact-row:last-child { border-bottom: none; }
  .contact-row:hover { opacity: 0.7; }

  /* Tweaks */
  .tweaks-panel {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    background: #111111;
    border: 1px solid #333333;
    padding: 20px;
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Mobile */
  @media (max-width: 768px) {
    .layout { flex-direction: column !important; height: auto !important; overflow: auto !important; }
    .left-col { width: 100% !important; height: auto !important; border-right: none !important; border-bottom: 1px solid #222222 !important; padding: 40px 24px !important; }
    .right-col { width: 100% !important; height: auto !important; padding: 40px 24px !important; }
    html, body { overflow: auto !important; height: auto !important; }
    .hero-name { font-size: clamp(32px, 9vw, 60px) !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "scanlines": true,
  "dividerStyle": "line"
}/*EDITMODE-END*/;

/* ─── PROJECTS ─── */
const PROJECTS = [
  {
    id: 1,
    title: 'Jobber Clone',
    desc: 'Full-stack field service management platform. Multi-tenant SaaS with real-time scheduling and invoicing.',
    tags: ['TypeScript', 'React', 'Node.js', 'PostgreSQL'],
    year: '2024',
  },
  {
    id: 2,
    title: 'Dev Dashboard',
    desc: 'Internal engineering metrics platform. Build times, deploy frequency, and incident tracking.',
    tags: ['Next.js', 'GraphQL', 'Docker'],
    year: '2024',
  },
  {
    id: 3,
    title: 'CLI Toolkit',
    desc: 'Developer tooling suite for project scaffolding and environment bootstrapping. 12 project templates.',
    tags: ['Node.js', 'TypeScript', 'Bash'],
    year: '2023',
  },
  {
    id: 4,
    title: 'Auth Service',
    desc: 'Stateless JWT microservice with refresh token rotation and OAuth2 provider integration.',
    tags: ['Node.js', 'Redis', 'Docker', 'AWS'],
    year: '2023',
  },
  {
    id: 5,
    title: 'Data Pipeline',
    desc: 'Event-driven ETL pipeline processing 50k+ records daily. Schema validation, error queues, alerting.',
    tags: ['TypeScript', 'PostgreSQL', 'AWS'],
    year: '2022',
  },
];

/* ─── WORK ROW ─── */
const WorkRow = ({ project }) => {
  const [hovered, setHovered] = React.useState(false);
  return (
    <div
      className="work-row"
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
    >
      <div style={{ flex: 1, paddingRight: 16 }}>
        <div className="row-title" style={{
          fontFamily: "'Space Mono', monospace",
          fontSize: 13,
          color: '#FFFFFF',
          letterSpacing: '0.02em',
          marginBottom: 5,
          transition: 'color 150ms ease-out',
        }}>{project.title}</div>
        <div style={{
          fontFamily: "'Space Mono', monospace",
          fontSize: 10,
          color: '#666666',
          lineHeight: 1.6,
          marginBottom: 8,
          letterSpacing: '0.02em',
        }}>{project.desc}</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
          {project.tags.map(t => (
            <span key={t} style={{
              fontFamily: "'Space Mono', monospace",
              fontSize: 9,
              color: '#555555',
              letterSpacing: '0.05em',
              textTransform: 'uppercase',
            }}>[{t}]</span>
          ))}
        </div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4, minWidth: 48 }}>
        <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 9, color: '#333333', letterSpacing: '0.06em' }}>{project.year}</span>
        <span className="row-arrow" style={{ fontSize: 14, color: hovered ? '#FFFFFF' : '#444444', transition: 'color 150ms ease-out' }}>↗</span>
      </div>
    </div>
  );
};

/* ─── TWEAKS ─── */
const TweaksPanel = ({ tweaks, updateTweak, open }) => {
  if (!open) return null;
  return (
    <div className="tweaks-panel">
      <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: '#999999' }}>Tweaks</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        <label style={{ fontFamily: "'Space Mono', monospace", fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.07em', color: '#666666' }}>Scanlines</label>
        <div style={{ display: 'flex', gap: 6 }}>
          {['On', 'Off'].map(o => (
            <button key={o} onClick={() => {
              const val = o === 'On';
              updateTweak('scanlines', val);
              document.body.style.backgroundImage = val
                ? 'repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 3px)'
                : 'none';
            }} style={{
              fontFamily: "'Space Mono', monospace", fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.06em',
              padding: '6px 12px', border: '1px solid', cursor: 'pointer',
              borderColor: (o === 'On') === tweaks.scanlines ? '#E8E8E8' : '#333333',
              background: 'transparent',
              color: (o === 'On') === tweaks.scanlines ? '#E8E8E8' : '#555555',
              transition: 'all 150ms ease-out',
            }}>{o}</button>
          ))}
        </div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        <label style={{ fontFamily: "'Space Mono', monospace", fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.07em', color: '#666666' }}>Column divide</label>
        <div style={{ display: 'flex', gap: 6 }}>
          {['Line', 'Gap'].map(o => (
            <button key={o} onClick={() => updateTweak('dividerStyle', o.toLowerCase())} style={{
              fontFamily: "'Space Mono', monospace", fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.06em',
              padding: '6px 12px', border: '1px solid', cursor: 'pointer',
              borderColor: tweaks.dividerStyle === o.toLowerCase() ? '#E8E8E8' : '#333333',
              background: 'transparent',
              color: tweaks.dividerStyle === o.toLowerCase() ? '#E8E8E8' : '#555555',
              transition: 'all 150ms ease-out',
            }}>{o}</button>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ─── APP ─── */
const App = () => {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweakOpen, setTweakOpen] = React.useState(false);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const divBorder = tweaks.dividerStyle === 'line'
    ? '1px solid #222222'
    : 'none';

  return (
    <div style={{ height: '100vh', background: '#000000', display: 'flex', flexDirection: 'column' }}>

      {/* Main layout */}
      <div className="layout" style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>

        {/* ── LEFT: Identity ── */}
        <div className="left-col" style={{
          width: '38%',
          minWidth: 320,
          borderRight: divBorder,
          padding: '56px 48px 48px',
          display: 'flex',
          flexDirection: 'column',
          justifyContent: 'space-between',
          overflow: 'hidden',
          /* Dot grid — left panel only */
          backgroundImage: 'radial-gradient(circle, #1A1A1A 1px, transparent 1px)',
          backgroundSize: '16px 16px',
          position: 'relative',
        }}>
          {/* Fade mask on dot grid */}
          <div style={{
            position: 'absolute', inset: 0, pointerEvents: 'none',
            background: 'radial-gradient(ellipse 120% 80% at 20% 30%, transparent 30%, rgba(0,0,0,0.9) 100%)',
          }} />

          <div style={{ position: 'relative', zIndex: 1 }}>
            {/* Name */}
            <h1 className="hero-name" style={{
              fontFamily: "'Doto', monospace",
              fontSize: 'clamp(36px, 3.8vw, 60px)',
              fontWeight: 400,
              color: '#FFFFFF',
              lineHeight: 1.05,
              letterSpacing: '0.02em',
              marginBottom: 2,
            }}>
              JAMES<br />CATTERALL<span className="hero-cursor">█</span>
            </h1>

            {/* Divider */}
            <div style={{ borderTop: '1px solid #2A2A2A', margin: '24px 0' }} />

            {/* Status rows */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {[
                { label: 'STATUS', value: 'ONLINE', valueColor: '#4A9E5C' },
                { label: 'ROLE',   value: 'SOFTWARE DEVELOPER' },
                { label: 'LOC',    value: 'LONDON, UK' },
              ].map(({ label, value, valueColor }) => (
                <div key={label} style={{ display: 'flex', gap: 16, alignItems: 'baseline' }}>
                  <span style={{
                    fontFamily: "'Space Mono', monospace",
                    fontSize: 10, color: '#444444',
                    letterSpacing: '0.07em', textTransform: 'uppercase',
                    minWidth: 56,
                  }}>{label}</span>
                  <span style={{
                    fontFamily: "'Space Mono', monospace",
                    fontSize: 10, color: valueColor || '#999999',
                    letterSpacing: '0.04em', textTransform: 'uppercase',
                  }}>{value}</span>
                </div>
              ))}
            </div>

            {/* Divider */}
            <div style={{ borderTop: '1px solid #1A1A1A', margin: '24px 0' }} />

            {/* Contact — inline with icons */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {[
                { icon: '✉', value: 'james.catterall92@gmail.com', href: 'mailto:james.catterall92@gmail.com' },
                { icon: '⌥', value: 'github.com/jcatterall', href: 'https://github.com/jcatterall' },
              ].map(l => (
                <a key={l.value} href={l.href} target="_blank" rel="noopener noreferrer"
                  style={{ display: 'flex', alignItems: 'center', gap: 10, opacity: 1, transition: 'opacity 150ms ease-out' }}
                  onMouseEnter={e => e.currentTarget.style.opacity = '0.6'}
                  onMouseLeave={e => e.currentTarget.style.opacity = '1'}
                >
                  <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: '#444444', lineHeight: 1 }}>{l.icon}</span>
                  <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: '#999999', letterSpacing: '0.02em' }}>{l.value}</span>
                  <span style={{ fontSize: 11, color: '#333333', marginLeft: 'auto' }}>↗</span>
                </a>
              ))}
            </div>
          </div>

          {/* Bottom stamp */}
          <div style={{
            position: 'relative', zIndex: 1,
            fontFamily: "'Space Mono', monospace",
            fontSize: 9, color: '#2A2A2A',
            letterSpacing: '0.06em', textTransform: 'uppercase',
          }}>© 2025 JAMES CATTERALL</div>
        </div>

        {/* ── RIGHT: Work ── */}
        <div className="right-col" style={{
          flex: 1,
          padding: '56px 48px 48px',
          display: 'flex',
          flexDirection: 'column',
          overflow: 'hidden',
        }}>
          {/* Prompt */}
          <div style={{
            fontFamily: "'Space Mono', monospace",
            fontSize: 12,
            color: '#999999',
            marginBottom: 24,
            display: 'flex',
            alignItems: 'center',
            letterSpacing: '0.04em',
            flexShrink: 0,
          }}>
            <span style={{ color: '#D71921', marginRight: 6 }}>{'>'}</span>
            <span style={{ color: '#E8E8E8' }}>./projects</span>
          </div>

          {/* Column headers */}
          <div style={{
            display: 'flex', justifyContent: 'space-between',
            padding: '6px 24px 10px 20px',
            borderBottom: '1px solid #222222',
            flexShrink: 0,
          }}>
            <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 9, color: '#333333', letterSpacing: '0.08em', textTransform: 'uppercase' }}>PROJECTS</span>
            <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 9, color: '#333333', letterSpacing: '0.08em', textTransform: 'uppercase' }}>YEAR</span>
          </div>

          {/* Rows — scrollable if needed */}
          <div style={{ flex: 1, overflowY: 'auto' }}>
            {PROJECTS.map(p => <WorkRow key={p.id} project={p} />)}
            <div style={{
              padding: '12px 24px',
              fontFamily: "'Space Mono', monospace",
              fontSize: 9, color: '#2A2A2A',
              letterSpacing: '0.06em',
            }}>
              {PROJECTS.length} entries — EOF
            </div>
          </div>
        </div>
      </div>

      <TweaksPanel tweaks={tweaks} updateTweak={updateTweak} open={tweakOpen} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
