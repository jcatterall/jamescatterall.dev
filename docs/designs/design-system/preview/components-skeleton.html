<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .label { font-family: 'Space Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: #444; margin-bottom: 10px; }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 1; }
  }
  .skel { background: #1a1a1a; border-radius: 4px; animation: pulse 1.8s ease-in-out infinite; }

  /* Card skeleton */
  .skel-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; width: 280px; display: flex; flex-direction: column; gap: 12px; }
  .skel-title  { height: 16px; width: 60%; }
  .skel-line   { height: 12px; width: 100%; }
  .skel-line-sm{ height: 12px; width: 75%; }
  .skel-tag    { height: 24px; width: 56px; border-radius: 999px; }
  .skel-tags   { display: flex; gap: 6px; }
  .skel-meta   { height: 10px; width: 40%; animation-delay: 0.3s; }

  /* Stat row skeleton */
  .skel-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; }
  .skel-stat-label { height: 10px; width: 30%; }
  .skel-stat-val   { height: 10px; width: 15%; animation-delay: 0.2s; }

  /* Nav skeleton */
  .skel-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 0 16px 0; border-bottom: 1px solid #1a1a1a; }
  .skel-logo { height: 20px; width: 48px; }
  .skel-nav-links { display: flex; gap: 32px; }
  .skel-nav-link { height: 10px; width: 40px; animation-delay: 0.1s; }
</style>
</head>
<body>
  <div>
    <div class="label">CARD SKELETON</div>
    <div class="skel-card">
      <div class="skel skel-title"></div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <div class="skel skel-line"></div>
        <div class="skel skel-line-sm"></div>
      </div>
      <div class="skel-tags">
        <div class="skel skel-tag"></div>
        <div class="skel skel-tag" style="animation-delay:0.15s"></div>
        <div class="skel skel-tag" style="animation-delay:0.3s"></div>
      </div>
      <div class="skel skel-meta"></div>
    </div>
  </div>

  <div>
    <div class="label">STAT ROWS SKELETON</div>
    <div style="border-top:1px solid #1a1a1a">
      <div class="skel-stat-row"><div class="skel skel-stat-label"></div><div class="skel skel-stat-val"></div></div>
      <div class="skel-stat-row"><div class="skel skel-stat-label" style="width:20%;animation-delay:0.1s"></div><div class="skel skel-stat-val" style="animation-delay:0.3s"></div></div>
      <div class="skel-stat-row"><div class="skel skel-stat-label" style="width:35%;animation-delay:0.2s"></div><div class="skel skel-stat-val" style="animation-delay:0.4s"></div></div>
    </div>
  </div>

  <div>
    <div class="label">NAV SKELETON</div>
    <div class="skel-nav">
      <div class="skel skel-logo"></div>
      <div class="skel-nav-links">
        <div class="skel skel-nav-link"></div>
        <div class="skel skel-nav-link" style="animation-delay:0.2s"></div>
        <div class="skel skel-nav-link" style="animation-delay:0.4s"></div>
        <div class="skel skel-nav-link" style="animation-delay:0.6s"></div>
      </div>
      <div class="skel" style="height:32px;width:88px;border-radius:999px;animation-delay:0.3s"></div>
    </div>
  </div>
</body>
</html>
