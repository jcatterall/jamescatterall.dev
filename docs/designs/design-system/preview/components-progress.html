<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 24px; display: flex; flex-direction: column; gap: 24px; }
  .label { font-family: 'Space Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: #444; margin-bottom: 8px; }
  .sublabel { font-family: 'Space Mono', monospace; font-size: 9px; color: #555; margin-top: 6px; }

  /* Segmented progress bar — mechanical, instrument-like */
  .progress-track { display: flex; gap: 2px; align-items: center; }
  .progress-seg {
    height: 8px; flex: 1; background: #1a1a1a; border-radius: 0;
    transition: background 200ms ease-out;
  }
  .progress-seg.filled { background: #e8e8e8; }
  .progress-seg.accent { background: #d71921; }
  .progress-seg.success { background: #4a9e5c; }
  .progress-seg.warning { background: #d4a843; }

  /* With label row */
  .progress-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .progress-pct { font-family: 'Space Mono', monospace; font-size: 10px; color: #666; }
</style>
</head>
<body>
  <div>
    <div class="label">60% — DEFAULT</div>
    <div class="progress-row">
      <span class="progress-pct" style="color:#999">COMPLETION</span>
      <span class="progress-pct">6 / 10</span>
    </div>
    <div class="progress-track">
      <div class="progress-seg filled"></div><div class="progress-seg filled"></div>
      <div class="progress-seg filled"></div><div class="progress-seg filled"></div>
      <div class="progress-seg filled"></div><div class="progress-seg filled"></div>
      <div class="progress-seg"></div><div class="progress-seg"></div>
      <div class="progress-seg"></div><div class="progress-seg"></div>
    </div>
  </div>

  <div>
    <div class="label">100% — SUCCESS</div>
    <div class="progress-track">
      <div class="progress-seg success"></div><div class="progress-seg success"></div>
      <div class="progress-seg success"></div><div class="progress-seg success"></div>
      <div class="progress-seg success"></div><div class="progress-seg success"></div>
      <div class="progress-seg success"></div><div class="progress-seg success"></div>
      <div class="progress-seg success"></div><div class="progress-seg success"></div>
    </div>
  </div>

  <div>
    <div class="label">30% — WARNING</div>
    <div class="progress-track">
      <div class="progress-seg warning"></div><div class="progress-seg warning"></div>
      <div class="progress-seg warning"></div>
      <div class="progress-seg"></div><div class="progress-seg"></div>
      <div class="progress-seg"></div><div class="progress-seg"></div>
      <div class="progress-seg"></div><div class="progress-seg"></div>
      <div class="progress-seg"></div>
    </div>
  </div>

  <div>
    <div class="label">CRITICAL — ACCENT</div>
    <div class="progress-track">
      <div class="progress-seg accent"></div><div class="progress-seg accent"></div>
      <div class="progress-seg"></div><div class="progress-seg"></div>
      <div class="progress-seg"></div><div class="progress-seg"></div>
      <div class="progress-seg"></div><div class="progress-seg"></div>
      <div class="progress-seg"></div><div class="progress-seg"></div>
    </div>
  </div>

  <div>
    <div class="label">SKILL LEVEL — VARIED</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <div class="progress-row"><span class="progress-pct" style="color:#999;font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Rust</span><span class="progress-pct">9/10</span></div>
        <div class="progress-track">
          <div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg"></div>
        </div>
      </div>
      <div>
        <div class="progress-row"><span class="progress-pct" style="color:#999;font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Go</span><span class="progress-pct">7/10</span></div>
        <div class="progress-track">
          <div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg filled"></div><div class="progress-seg"></div><div class="progress-seg"></div><div class="progress-seg"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
