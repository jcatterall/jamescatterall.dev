<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 20px; display: flex; gap: 32px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar  { background: #333; width: 32px; }
  .label { font-family: 'Space Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: #444; text-align: center; line-height: 1.6; }
  .val   { font-family: 'Space Mono', monospace; font-size: 9px; color: #666; }
</style>
</head>
<body>
  <div class="item"><div class="bar" style="height:4px"></div><div class="label">--nd-space-1</div><div class="val">4px</div><div class="label" style="color:#555">TIGHT</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="label">--nd-space-2</div><div class="val">8px</div><div class="label" style="color:#555">BELONGS</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="label">--nd-space-3</div><div class="val">12px</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="label">--nd-space-4</div><div class="val">16px</div><div class="label" style="color:#555">GROUP</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="label">--nd-space-5</div><div class="val">24px</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="label">--nd-space-6</div><div class="val">32px</div><div class="label" style="color:#555">SECTION</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="label">--nd-space-7</div><div class="val">48px</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="label">--nd-space-8</div><div class="val">64px</div><div class="label" style="color:#555">CONTEXT</div></div>
  <div class="item"><div class="bar" style="height:96px"></div><div class="label">--nd-space-9</div><div class="val">96px</div><div class="label" style="color:#555">VAST</div></div>
</body>
</html>
