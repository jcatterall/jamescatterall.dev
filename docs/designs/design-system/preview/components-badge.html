<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid #333;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
    transition: border-color 200ms ease-out, color 200ms ease-out;
    cursor: default;
  }
  .badge:hover { border-color: #e8e8e8; color: #e8e8e8; }
  .badge.active { border-color: #e8e8e8; color: #fff; }
  .badge.disabled { border-color: #222; color: #666; pointer-events: none; }
  .label { font-family: 'Space Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: #444; margin-bottom: 6px; }
  .col { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
</style>
</head>
<body>
  <div class="col">
    <div class="label">DEFAULT</div>
    <div class="badge">Rust</div>
  </div>
  <div class="col">
    <div class="label">HOVER (mouseover)</div>
    <div class="badge" style="border-color:#e8e8e8;color:#e8e8e8">WebAssembly</div>
  </div>
  <div class="col">
    <div class="label">ACTIVE</div>
    <div class="badge active">Systems</div>
  </div>
  <div class="col">
    <div class="label">DISABLED</div>
    <div class="badge disabled">Deprecated</div>
  </div>
  <div class="col">
    <div class="label">ACCENT</div>
    <div class="badge" style="border-color:#d71921;color:#d71921">Breaking</div>
  </div>
  <div class="col">
    <div class="label">SUCCESS</div>
    <div class="badge" style="border-color:#4a9e5c;color:#4a9e5c">Deployed</div>
  </div>
</body>
</html>
