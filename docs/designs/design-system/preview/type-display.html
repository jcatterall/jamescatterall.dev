<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 24px; }
  .specimen { margin-bottom: 20px; display: flex; align-items: baseline; gap: 24px; }
  .meta { font-family: 'Space Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: #444; min-width: 120px; flex-shrink: 0; line-height: 1.6; }
  .divider { border: none; border-top: 1px solid #1a1a1a; margin: 12px 0; }
</style>
</head>
<body>
  <!-- Doto Display -->
  <div class="specimen">
    <div class="meta">DOTO<br>96PX / DISPLAY 2XL</div>
    <div style="font-family:'Doto',monospace;font-size:72px;color:#fff;line-height:1">96</div>
  </div>
  <hr class="divider">
  <div class="specimen">
    <div class="meta">DOTO<br>48PX / DISPLAY LG</div>
    <div style="font-family:'Doto',monospace;font-size:48px;color:#fff;line-height:1">HELLO WORLD</div>
  </div>
  <hr class="divider">
  <div class="specimen">
    <div class="meta">DOTO<br>36PX / DISPLAY MD</div>
    <div style="font-family:'Doto',monospace;font-size:36px;color:#e8e8e8;line-height:1">PORTFOLIO 2024</div>
  </div>
</body>
</html>
