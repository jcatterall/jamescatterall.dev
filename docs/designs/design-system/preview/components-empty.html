<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 0; }
  .empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 64px 32px; text-align: center;
    background-image: radial-gradient(circle, #2a2a2a 1px, transparent 1px);
    background-size: 16px 16px;
    min-height: 220px;
  }
  .empty-headline {
    font-family: 'Space Mono', monospace; font-size: 13px; text-transform: uppercase;
    letter-spacing: 0.08em; color: #999; margin-bottom: 8px;
  }
  .empty-desc {
    font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 300;
    color: #444; max-width: 280px; line-height: 1.6;
  }
  .empty-action {
    margin-top: 24px; font-family: 'Space Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.06em; color: #000; background: #fff;
    border: none; border-radius: 999px; padding: 10px 24px; cursor: pointer;
    transition: opacity 200ms ease-out;
  }
  .empty-action:hover { opacity: 0.85; }
</style>
</head>
<body>
  <div class="empty">
    <div class="empty-headline">No Results</div>
    <div class="empty-desc">No projects match the selected filters. Try adjusting your criteria.</div>
    <button class="empty-action">Clear Filters</button>
  </div>
</body>
</html>
