<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 24px; display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .label { font-family: 'Space Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: #444; }
  button {
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 44px; padding: 0 24px; border-radius: 999px;
    font-family: 'Space Mono', monospace; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.06em;
    cursor: pointer; border: none; transition: opacity 200ms ease-out, border-color 200ms ease-out, color 200ms ease-out, background 200ms ease-out;
  }
  .btn-primary { background: #fff; color: #000; border: none; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-secondary { background: transparent; color: #e8e8e8; border: 1px solid #333; }
  .btn-secondary:hover { border-color: #e8e8e8; }
  .btn-secondary:disabled { color: #666; border-color: #222; cursor: not-allowed; }

  .btn-ghost { background: transparent; color: #999; border: none; padding: 0 12px; }
  .btn-ghost:hover { color: #e8e8e8; }
  .btn-ghost:disabled { color: #444; cursor: not-allowed; }

  .btn-destructive { background: transparent; color: #d71921; border: 1px solid #d71921; }
  .btn-destructive:hover { background: rgba(215,25,33,0.15); }
  .btn-destructive:disabled { color: #666; border-color: #333; cursor: not-allowed; }
</style>
</head>
<body>
  <div class="col">
    <div class="label">PRIMARY</div>
    <button class="btn-primary">View Work</button>
    <button class="btn-primary" style="opacity:0.85">Hover</button>
    <button class="btn-primary" disabled>Disabled</button>
  </div>
  <div class="col">
    <div class="label">SECONDARY</div>
    <button class="btn-secondary">Download CV</button>
    <button class="btn-secondary" style="border-color:#e8e8e8">Hover</button>
    <button class="btn-secondary" disabled>Disabled</button>
  </div>
  <div class="col">
    <div class="label">GHOST</div>
    <button class="btn-ghost">Learn More</button>
    <button class="btn-ghost" style="color:#e8e8e8">Hover</button>
    <button class="btn-ghost" disabled>Disabled</button>
  </div>
  <div class="col">
    <div class="label">DESTRUCTIVE</div>
    <button class="btn-destructive">Delete Project</button>
    <button class="btn-destructive" style="background:rgba(215,25,33,0.15)">Hover</button>
    <button class="btn-destructive" disabled>Disabled</button>
  </div>
</body>
</html>
