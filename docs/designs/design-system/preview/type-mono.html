<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 24px; }
  .row { display: flex; align-items: center; gap: 24px; margin-bottom: 12px; }
  .meta { font-family: 'Space Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: #444; min-width: 140px; flex-shrink: 0; line-height: 1.6; }
  .divider { border: none; border-top: 1px solid #1a1a1a; margin: 8px 0; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">SPACE MONO<br>13PX / LABEL LG</div>
    <div style="font-family:'Space Mono',monospace;font-size:13px;text-transform:uppercase;letter-spacing:0.07em;color:#999">AVAILABLE FOR WORK</div>
  </div>
  <hr class="divider">
  <div class="row">
    <div class="meta">SPACE MONO<br>11PX / LABEL MD</div>
    <div style="font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.07em;color:#999">01 — SELECTED WORK</div>
  </div>
  <hr class="divider">
  <div class="row">
    <div class="meta">SPACE MONO<br>10PX / LABEL SM</div>
    <div style="font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#666">LAST UPDATED 2024-11-03</div>
  </div>
  <hr class="divider">
  <div class="row">
    <div class="meta">SPACE MONO<br>11PX / DATA VALUE</div>
    <div style="font-family:'Space Mono',monospace;font-size:11px;color:#fff">2024-11-03</div>
  </div>
  <hr class="divider">
  <div class="row">
    <div class="meta">SPACE MONO<br>11PX / ACCENT</div>
    <div style="font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.07em;color:#d71921">ERROR — BUILD FAILED</div>
  </div>
  <hr class="divider">
  <div class="row">
    <div class="meta">SPACE MONO<br>11PX / SUCCESS</div>
    <div style="font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.07em;color:#4a9e5c">DEPLOYED — PRODUCTION</div>
  </div>
</body>
</html>
