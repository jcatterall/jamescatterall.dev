<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 24px; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px 4px 12px; border-radius: 999px;
    border: 1px solid #333; background: transparent;
    font-family: 'Space Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.06em; color: #999;
    transition: border-color 200ms ease-out, color 200ms ease-out;
    cursor: default;
  }
  .tag:hover { border-color: #e8e8e8; color: #e8e8e8; }
  .tag .remove {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px; border-radius: 999px;
    font-size: 12px; line-height: 1; color: #666; cursor: pointer;
    transition: color 200ms ease-out;
  }
  .tag:hover .remove { color: #e8e8e8; }
  .tag.active { border-color: #e8e8e8; color: #fff; }
  .tag.active .remove { color: #999; }
  .tag.accent { border-color: #d71921; color: #d71921; }
  .tag.accent .remove { color: #d71921; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-family: 'Space Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: #444; }
</style>
</head>
<body>
  <div class="col">
    <div class="label">DEFAULT</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <span class="tag">Rust</span>
      <span class="tag">WebAssembly<span class="remove">×</span></span>
      <span class="tag">Embedded</span>
    </div>
  </div>
  <div class="col">
    <div class="label">ACTIVE</div>
    <div style="display:flex;gap:8px">
      <span class="tag active">Systems<span class="remove">×</span></span>
    </div>
  </div>
  <div class="col">
    <div class="label">ACCENT / ERROR</div>
    <div style="display:flex;gap:8px">
      <span class="tag accent">Breaking<span class="remove">×</span></span>
    </div>
  </div>
  <div class="col">
    <div class="label">NO REMOVE</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <span class="tag">2024</span>
      <span class="tag">Open Source</span>
    </div>
  </div>
</body>
</html>
