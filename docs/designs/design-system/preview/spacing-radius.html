<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 24px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box  { width: 64px; height: 64px; background: #111; border: 1px solid #333; }
  .label { font-family: 'Space Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: #444; text-align: center; line-height: 1.6; }
  .val   { font-family: 'Space Mono', monospace; font-size: 9px; color: #666; }
</style>
</head>
<body>
  <div class="item">
    <div class="box" style="border-radius:4px"></div>
    <div class="label">INPUT<br>TECHNICAL</div><div class="val">4px</div>
  </div>
  <div class="item">
    <div class="box" style="border-radius:8px"></div>
    <div class="label">TOOLTIP<br>DROPDOWN</div><div class="val">8px</div>
  </div>
  <div class="item">
    <div class="box" style="border-radius:12px"></div>
    <div class="label">CARD<br>PANEL</div><div class="val">12px</div>
  </div>
  <div class="item">
    <div class="box" style="border-radius:999px"></div>
    <div class="label">PILL<br>BUTTON / TAG</div><div class="val">999px</div>
  </div>
</body>
</html>
