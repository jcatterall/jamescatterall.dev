<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 24px; display: flex; flex-direction: column; gap: 0; }
  .stat-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid #1a1a1a;
  }
  .stat-row:first-of-type { border-top: 1px solid #1a1a1a; }
  .stat-label { font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: #999; }
  .stat-value { font-family: 'Space Mono', monospace; font-size: 11px; color: #fff; display: flex; align-items: baseline; gap: 6px; }
  .stat-unit  { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 0.07em; }
  .dot { width: 6px; height: 6px; border-radius: 999px; flex-shrink: 0; }
  .section-label { font-family: 'Space Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.09em; color: #444; margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="section-label">STAT ROW — VARIANTS</div>

  <div class="stat-row">
    <span class="stat-label">Years Experience</span>
    <span class="stat-value">7 <span class="stat-unit">years</span></span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Projects Shipped</span>
    <span class="stat-value">42</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Compile Time</span>
    <span class="stat-value" style="color:#4a9e5c">400 <span class="stat-unit">ms</span></span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Bundle Size</span>
    <span class="stat-value" style="color:#d4a843">2.1 <span class="stat-unit">mb</span></span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Status</span>
    <span class="stat-value" style="gap:8px">
      <span class="dot" style="background:#4a9e5c"></span>
      Available
    </span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Build</span>
    <span class="stat-value" style="gap:8px">
      <span class="dot" style="background:#d71921"></span>
      <span style="color:#d71921">Failed</span>
    </span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Last Deploy</span>
    <span class="stat-value" style="color:#666">2024-11-03 <span class="stat-unit">utc</span></span>
  </div>
</body>
</html>
