<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0a; color: #e8e8e8; font-family: 'Space Grotesk', sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #222; }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 1px; background: #333; outline: none; width: 100%; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; background: #e8e8e8; cursor: pointer; border: none; }
  input[type=range]::-moz-range-thumb { width: 12px; height: 12px; background: #e8e8e8; cursor: pointer; border: none; border-radius: 0; }
  @keyframes pulseGreen { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes scanPulse { 0%,100%{opacity:0.03} 50%{opacity:0.07} }
  button { font-family: 'Space Mono', monospace; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">

/* ── TOKENS ── */
const nd = {
  black: '#000000',
  bg: '#0a0a0a',
  surface: '#111111',
  surfaceRaised: '#1a1a1a',
  border: '#222222',
  borderVisible: '#333333',
  textDisabled: '#444444',
  textSecondary: '#666666',
  textMid: '#999999',
  textPrimary: '#e8e8e8',
  textDisplay: '#ffffff',
  accent: '#d71921',
  success: '#4a9e5c',
  warning: '#d4a843',
  interactive: '#5b9bf6',
  mono: "'Space Mono', monospace",
  grotesk: "'Space Grotesk', sans-serif",
  doto: "'Doto', monospace",
};

/* ── CHAR SETS ── */
const CHAR_SETS = [
  { id: 'classic',  label: 'CLASSIC',  chars: ' .:-=+*#%@' },
  { id: 'blocks',   label: 'BLOCKS',   chars: ' ░▒▓█' },
  { id: 'braille',  label: 'BRAILLE',  chars: ' ⠁⠃⠇⠏⠟⠿⣿' },
  { id: 'digits',   label: 'DIGITS',   chars: ' 1234567890' },
  { id: 'binary',   label: 'BINARY',   chars: ' 01' },
];

/* ── NOISE ── */
function noise(x, y, t) {
  const v =
    Math.sin(x * 0.3 + t * 0.7) * 0.3 +
    Math.sin(y * 0.4 + t * 0.5) * 0.25 +
    Math.sin((x + y) * 0.25 + t * 0.9) * 0.2 +
    Math.sin((x - y) * 0.2 + t * 0.6) * 0.15 +
    Math.cos(x * 0.5 * Math.sin(t * 0.3) + y * 0.4) * 0.1;
  return (v + 1) / 2;
}

/* ── FACE MASK: simulate person silhouette ── */
function faceMask(col, row, cols, rows) {
  const cx = cols / 2, cy = rows * 0.42;
  const rx = cols * 0.22, ry = rows * 0.32;
  const nx = (col - cx) / rx;
  const ny = (row - cy) / ry;
  const d = nx * nx + ny * ny;
  // Soft falloff — 1 inside face, 0 outside
  return Math.max(0, Math.min(1, 1.2 - d));
}

/* ── ASCII CANVAS ── */
const AsciiCanvas = ({ cols, charSet, colorMode, invert, active }) => {
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const tRef = React.useRef(0);

  React.useEffect(() => {
    if (!active) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const draw = (timestamp) => {
      tRef.current = timestamp * 0.001;
      const t = tRef.current;

      const W = canvas.width;
      const H = canvas.height;
      const charW = W / cols;
      const rows = Math.floor(H / (charW * 1.8));
      const charH = H / rows;
      const fontSize = Math.max(8, charW * 0.85);

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = nd.bg;
      ctx.fillRect(0, 0, W, H);
      ctx.font = `${fontSize}px ${nd.mono}`;
      ctx.textBaseline = 'top';

      const chars = charSet.chars;
      const len = chars.length;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const n = noise(col, row, t);
          const mask = faceMask(col, row, cols, rows);

          // Combine noise with face mask — face is brighter
          let lum = n * 0.5 + mask * 0.6;
          lum = Math.max(0, Math.min(1, lum));

          if (invert) lum = 1 - lum;

          const charIdx = Math.floor(lum * (len - 1));
          const ch = chars[charIdx];
          if (!ch || ch === ' ') continue;

          const x = col * charW;
          const y = row * charH;

          if (colorMode) {
            // Warm skin tones in face region, cool in background
            const r = Math.floor(180 + mask * 60 + n * 30);
            const g = Math.floor(120 + mask * 50 + n * 20);
            const b = Math.floor(80 + n * 60);
            ctx.fillStyle = `rgba(${r},${g},${b},${0.5 + lum * 0.5})`;
          } else {
            const bright = Math.floor(60 + lum * 185);
            ctx.fillStyle = `rgb(${bright},${bright},${bright})`;
          }
          ctx.fillText(ch, x, y);
        }
      }

      rafRef.current = requestAnimationFrame(draw);
    };

    rafRef.current = requestAnimationFrame(draw);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [cols, charSet, colorMode, invert, active]);

  return (
    <canvas
      ref={canvasRef}
      width={800}
      height={520}
      style={{ width: '100%', height: '100%', display: 'block' }}
    />
  );
};

/* ── LABEL ── */
const Label = ({ children, style }) => (
  <div style={{
    fontFamily: nd.mono,
    fontSize: 10,
    textTransform: 'uppercase',
    letterSpacing: '0.08em',
    color: nd.textSecondary,
    ...style,
  }}>{children}</div>
);

/* ── TOGGLE ── */
const Toggle = ({ value, onChange }) => (
  <div
    onClick={() => onChange(!value)}
    style={{
      width: 32, height: 16,
      background: value ? nd.success : nd.border,
      position: 'relative',
      cursor: 'pointer',
      transition: 'background 200ms ease-out',
      flexShrink: 0,
    }}
  >
    <div style={{
      position: 'absolute',
      top: 3, left: value ? 18 : 3,
      width: 10, height: 10,
      background: nd.textDisplay,
      transition: 'left 200ms ease-out',
    }} />
  </div>
);

/* ── SEGMENTED ── */
const Segmented = ({ options, value, onChange }) => (
  <div style={{
    display: 'inline-flex',
    background: nd.black,
    border: `1px solid ${nd.border}`,
    padding: 2,
  }}>
    {options.map(o => (
      <button key={o.id} onClick={() => onChange(o.id)} style={{
        fontFamily: nd.mono, fontSize: 9,
        textTransform: 'uppercase', letterSpacing: '0.06em',
        padding: '5px 10px', border: 'none', cursor: 'pointer',
        background: value === o.id ? nd.textDisplay : 'transparent',
        color: value === o.id ? nd.black : nd.textSecondary,
        transition: 'background 150ms ease-out, color 150ms ease-out',
      }}>{o.label}</button>
    ))}
  </div>
);

/* ── CHAR SET PILL ── */
const CharSetPill = ({ cs, active, onClick }) => (
  <button onClick={onClick} style={{
    fontFamily: nd.mono, fontSize: 9,
    textTransform: 'uppercase', letterSpacing: '0.06em',
    padding: '5px 10px',
    border: `1px solid ${active ? nd.textPrimary : nd.border}`,
    background: active ? nd.surfaceRaised : 'transparent',
    color: active ? nd.textPrimary : nd.textSecondary,
    cursor: 'pointer',
    transition: 'all 150ms ease-out',
  }}>{cs.label}</button>
);

/* ── SIDEBAR ── */
const Sidebar = ({ cols, setCols, charSet, setCharSet, colorMode, setColorMode, invert, setInvert, fontSize, setFontSize, onExport, state, onAllow, onUpload }) => (
  <aside style={{
    width: 260,
    flexShrink: 0,
    borderRight: `1px solid ${nd.border}`,
    display: 'flex',
    flexDirection: 'column',
    background: nd.bg,
    overflow: 'hidden',
  }}>
    {/* Header */}
    <div style={{
      padding: '20px 20px 16px',
      borderBottom: `1px solid ${nd.border}`,
      flexShrink: 0,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
        <span style={{ fontFamily: nd.mono, fontSize: 10, color: nd.accent, letterSpacing: '0.06em' }}>{'>'}</span>
        <span style={{ fontFamily: nd.mono, fontSize: 10, color: nd.textSecondary, letterSpacing: '0.06em' }}>./ascii</span>
      </div>
      <div style={{ fontFamily: nd.grotesk, fontSize: 16, fontWeight: 600, color: nd.textDisplay, letterSpacing: '-0.01em' }}>ASCII Lens</div>
      <div style={{ fontFamily: nd.grotesk, fontSize: 12, color: nd.textSecondary, marginTop: 4, lineHeight: 1.5 }}>
        Real-time webcam to ASCII art. Runs entirely in the browser.
      </div>
    </div>

    {/* Controls — scroll if needed */}
    <div style={{ flex: 1, overflowY: 'auto', padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 20 }}>

      {/* Source */}
      <div>
        <Label style={{ marginBottom: 10 }}>Source</Label>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <button onClick={onAllow} style={{
            display: 'flex', alignItems: 'center', gap: 8,
            padding: '9px 14px',
            border: `1px solid ${state === 'live' ? nd.success : nd.border}`,
            background: state === 'live' ? 'rgba(74,158,92,0.08)' : 'transparent',
            color: state === 'live' ? nd.success : nd.textMid,
            fontFamily: nd.mono, fontSize: 10, letterSpacing: '0.06em',
            textTransform: 'uppercase', cursor: 'pointer',
            transition: 'all 150ms ease-out',
          }}>
            {state === 'live'
              ? <><div style={{ width: 6, height: 6, borderRadius: '50%', background: nd.success, animation: 'pulseGreen 2s ease-in-out infinite' }} /> WEBCAM ACTIVE</>
              : <><div style={{ width: 6, height: 6, borderRadius: '50%', background: nd.textDisabled }} /> ENABLE WEBCAM</>
            }
          </button>
          <button onClick={onUpload} style={{
            display: 'flex', alignItems: 'center', gap: 8,
            padding: '9px 14px',
            border: `1px solid ${state === 'upload' ? nd.interactive : nd.border}`,
            background: state === 'upload' ? 'rgba(91,155,246,0.08)' : 'transparent',
            color: state === 'upload' ? nd.interactive : nd.textMid,
            fontFamily: nd.mono, fontSize: 10, letterSpacing: '0.06em',
            textTransform: 'uppercase', cursor: 'pointer',
            transition: 'all 150ms ease-out',
          }}>↑ UPLOAD IMAGE</button>
        </div>
      </div>

      {/* Resolution */}
      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
          <Label>Resolution</Label>
          <span style={{ fontFamily: nd.mono, fontSize: 10, color: nd.textPrimary }}>{cols} cols</span>
        </div>
        <input type="range" min={40} max={200} step={4} value={cols}
          onChange={e => setCols(Number(e.target.value))}
        />
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6 }}>
          <span style={{ fontFamily: nd.mono, fontSize: 9, color: nd.textDisabled }}>40</span>
          <span style={{ fontFamily: nd.mono, fontSize: 9, color: nd.textDisabled }}>200</span>
        </div>
      </div>

      {/* Character set */}
      <div>
        <Label style={{ marginBottom: 10 }}>Character Set</Label>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
          {CHAR_SETS.map(cs => (
            <CharSetPill key={cs.id} cs={cs} active={charSet.id === cs.id} onClick={() => setCharSet(cs)} />
          ))}
        </div>
        {/* Preview of chars */}
        <div style={{
          marginTop: 8, padding: '6px 10px',
          background: nd.black, border: `1px solid ${nd.border}`,
          fontFamily: nd.mono, fontSize: 11, color: nd.textSecondary,
          letterSpacing: '0.15em', lineHeight: 1,
        }}>{charSet.chars}</div>
      </div>

      {/* Colour mode */}
      <div>
        <Label style={{ marginBottom: 10 }}>Mode</Label>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontFamily: nd.mono, fontSize: 10, color: nd.textMid, letterSpacing: '0.04em' }}>Colour</span>
            <Toggle value={colorMode} onChange={setColorMode} />
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontFamily: nd.mono, fontSize: 10, color: nd.textMid, letterSpacing: '0.04em' }}>Invert</span>
            <Toggle value={invert} onChange={setInvert} />
          </div>
        </div>
      </div>

      {/* Font size fine-tune */}
      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
          <Label>Font Size</Label>
          <span style={{ fontFamily: nd.mono, fontSize: 10, color: nd.textPrimary }}>{fontSize}px</span>
        </div>
        <input type="range" min={6} max={18} step={1} value={fontSize}
          onChange={e => setFontSize(Number(e.target.value))}
        />
      </div>
    </div>

    {/* Export */}
    <div style={{ padding: '16px 20px', borderTop: `1px solid ${nd.border}`, flexShrink: 0 }}>
      <button
        onClick={onExport}
        style={{
          width: '100%',
          padding: '11px 0',
          background: nd.textDisplay,
          color: nd.black,
          border: 'none',
          fontFamily: nd.mono, fontSize: 11,
          textTransform: 'uppercase', letterSpacing: '0.08em',
          cursor: 'pointer',
          transition: 'opacity 150ms ease-out',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        }}
        onMouseEnter={e => e.currentTarget.style.opacity = '0.85'}
        onMouseLeave={e => e.currentTarget.style.opacity = '1'}
      >
        ↓ EXPORT SVG
      </button>
      <div style={{ fontFamily: nd.mono, fontSize: 9, color: nd.textDisabled, textAlign: 'center', marginTop: 6, letterSpacing: '0.05em' }}>
        SNAPSHOT · PRESERVES COLOUR MODE
      </div>
    </div>
  </aside>
);

/* ── PERMISSION SCREEN ── */
const PermissionScreen = ({ onAllow, onUpload }) => (
  <div style={{
    flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
    gap: 0, background: nd.bg, position: 'relative', overflow: 'hidden',
    animation: 'fadeIn 300ms ease-out both',
  }}>
    {/* Dot grid */}
    <div style={{ position: 'absolute', inset: 0, backgroundImage: 'radial-gradient(circle, #1a1a1a 1px, transparent 1px)', backgroundSize: '18px 18px', opacity: 0.6 }} />
    {/* Scanline */}
    <div style={{ position: 'absolute', inset: 0, background: 'repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 3px)', pointerEvents: 'none' }} />

    <div style={{ position: 'relative', zIndex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0, maxWidth: 360, textAlign: 'center' }}>
      {/* Icon — camera outline in ASCII style */}
      <div style={{
        width: 64, height: 48,
        border: `1px solid ${nd.borderVisible}`,
        position: 'relative',
        marginBottom: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        {/* Lens circle */}
        <div style={{
          width: 28, height: 28,
          border: `1px solid ${nd.borderVisible}`,
          borderRadius: '50%',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <div style={{ width: 10, height: 10, borderRadius: '50%', background: nd.borderVisible }} />
        </div>
        {/* Shutter bump */}
        <div style={{
          position: 'absolute', top: -7, left: 18,
          width: 10, height: 7,
          border: `1px solid ${nd.borderVisible}`,
          borderBottom: 'none',
          background: nd.bg,
        }} />
        {/* Record dot */}
        <div style={{ position: 'absolute', top: 4, right: 6, width: 5, height: 5, borderRadius: '50%', background: nd.accent }} />
      </div>

      <div style={{ fontFamily: nd.mono, fontSize: 11, color: nd.textSecondary, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>
        Camera Access Required
      </div>
      <div style={{ fontFamily: nd.grotesk, fontSize: 13, color: nd.textMid, lineHeight: 1.6, marginBottom: 28 }}>
        ASCII Lens uses your webcam to render a live ASCII art feed. No data leaves your browser.
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, width: '100%' }}>
        <button onClick={onAllow} style={{
          padding: '11px 0',
          background: nd.textDisplay, color: nd.black, border: 'none',
          fontFamily: nd.mono, fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase',
          cursor: 'pointer', transition: 'opacity 150ms ease-out', width: '100%',
        }}
          onMouseEnter={e => e.currentTarget.style.opacity = '0.85'}
          onMouseLeave={e => e.currentTarget.style.opacity = '1'}
        >ALLOW CAMERA</button>
        <button onClick={onUpload} style={{
          padding: '11px 0',
          background: 'transparent', color: nd.textSecondary,
          border: `1px solid ${nd.border}`,
          fontFamily: nd.mono, fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase',
          cursor: 'pointer', transition: 'border-color 150ms ease-out', width: '100%',
        }}
          onMouseEnter={e => e.currentTarget.style.borderColor = nd.borderVisible}
          onMouseLeave={e => e.currentTarget.style.borderColor = nd.border}
        >USE IMAGE INSTEAD</button>
      </div>

      <div style={{ marginTop: 20, fontFamily: nd.mono, fontSize: 9, color: nd.textDisabled, letterSpacing: '0.06em' }}>
        HTTPS REQUIRED · NO SERVER · NO STORAGE
      </div>
    </div>
  </div>
);

/* ── UPLOAD SCREEN ── */
const UploadScreen = ({ onActivate }) => {
  const [dragging, setDragging] = React.useState(false);
  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      background: nd.bg, padding: 40,
      animation: 'fadeIn 200ms ease-out both',
    }}>
      <div
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={e => { e.preventDefault(); setDragging(false); onActivate(); }}
        onClick={onActivate}
        style={{
          width: '100%', maxWidth: 480,
          padding: '60px 40px',
          border: `1px dashed ${dragging ? nd.interactive : nd.borderVisible}`,
          background: dragging ? 'rgba(91,155,246,0.04)' : 'transparent',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12,
          cursor: 'pointer',
          transition: 'border-color 150ms ease-out, background 150ms ease-out',
        }}
      >
        <div style={{ fontFamily: nd.mono, fontSize: 24, color: dragging ? nd.interactive : nd.borderVisible, letterSpacing: '0.04em' }}>↑</div>
        <div style={{ fontFamily: nd.mono, fontSize: 11, color: nd.textSecondary, letterSpacing: '0.07em', textTransform: 'uppercase' }}>
          {dragging ? 'DROP TO PROCESS' : 'DRAG & DROP IMAGE'}
        </div>
        <div style={{ fontFamily: nd.grotesk, fontSize: 12, color: nd.textDisabled }}>or click to browse — PNG, JPG, WebP</div>
      </div>
    </div>
  );
};

/* ── STATUS BAR ── */
const StatusBar = ({ cols, charSet, colorMode, fps }) => (
  <div style={{
    height: 28,
    borderTop: `1px solid ${nd.border}`,
    display: 'flex', alignItems: 'center',
    padding: '0 16px',
    gap: 24,
    flexShrink: 0,
    background: nd.bg,
  }}>
    {[
      { k: 'MODE', v: colorMode ? 'COLOUR' : 'MONO', color: colorMode ? nd.warning : nd.textSecondary },
      { k: 'COLS', v: String(cols), color: nd.textSecondary },
      { k: 'SET',  v: charSet.label, color: nd.textSecondary },
      { k: 'FPS',  v: String(fps), color: nd.success },
    ].map(({ k, v, color }) => (
      <div key={k} style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
        <span style={{ fontFamily: nd.mono, fontSize: 9, color: nd.textDisabled, letterSpacing: '0.07em' }}>{k}</span>
        <span style={{ fontFamily: nd.mono, fontSize: 9, color, letterSpacing: '0.04em' }}>{v}</span>
      </div>
    ))}
    {/* Live indicator */}
    <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 6 }}>
      <div style={{ width: 5, height: 5, borderRadius: '50%', background: nd.success, animation: 'pulseGreen 2s ease-in-out infinite' }} />
      <span style={{ fontFamily: nd.mono, fontSize: 9, color: nd.success, letterSpacing: '0.07em' }}>LIVE</span>
    </div>
  </div>
);

/* ── NAV ── */
const Nav = () => (
  <nav style={{
    height: 48,
    borderBottom: `1px solid ${nd.border}`,
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '0 20px',
    background: 'rgba(10,10,10,0.96)',
    flexShrink: 0,
    zIndex: 10,
  }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
      {/* Back */}
      <a href="#" style={{
        fontFamily: nd.mono, fontSize: 10, color: nd.textSecondary,
        letterSpacing: '0.06em', display: 'flex', alignItems: 'center', gap: 6,
        transition: 'color 150ms ease-out',
      }}
        onMouseEnter={e => e.currentTarget.style.color = nd.textPrimary}
        onMouseLeave={e => e.currentTarget.style.color = nd.textSecondary}
      >← BACK</a>
      {/* Breadcrumb */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
        <span style={{ fontFamily: nd.mono, fontSize: 10, color: nd.textDisabled, letterSpacing: '0.06em' }}>
          <span style={{ color: nd.accent }}>{'>'}</span> jcatterall
        </span>
        <span style={{ fontFamily: nd.mono, fontSize: 10, color: nd.textDisabled }}>{'/'}</span>
        <span style={{ fontFamily: nd.mono, fontSize: 10, color: nd.textPrimary, letterSpacing: '0.06em' }}>ascii</span>
      </div>
    </div>

    {/* Right: keyboard hint */}
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <span style={{ fontFamily: nd.mono, fontSize: 9, color: nd.textDisabled, letterSpacing: '0.06em' }}>EXPORT</span>
      <kbd style={{
        fontFamily: nd.mono, fontSize: 9, color: nd.textDisabled,
        border: `1px solid ${nd.border}`,
        padding: '2px 6px', background: nd.surface, letterSpacing: '0.04em',
      }}>⌘E</kbd>
    </div>
  </nav>
);

/* ── FPS COUNTER (simulated) ── */
function useSimFPS() {
  const [fps, setFps] = React.useState(60);
  React.useEffect(() => {
    const id = setInterval(() => {
      setFps(58 + Math.floor(Math.random() * 4));
    }, 800);
    return () => clearInterval(id);
  }, []);
  return fps;
}

/* ── APP ── */
const App = () => {
  const [pageState, setPageState] = React.useState('permission'); // permission | live | upload
  const [cols, setCols] = React.useState(80);
  const [charSet, setCharSet] = React.useState(CHAR_SETS[0]);
  const [colorMode, setColorMode] = React.useState(false);
  const [invert, setInvert] = React.useState(false);
  const [fontSize, setFontSize] = React.useState(10);
  const [tweakOpen, setTweakOpen] = React.useState(false);
  const fps = useSimFPS();

  // Persist state
  React.useEffect(() => {
    try { const s = JSON.parse(localStorage.getItem('ascii-lens') || '{}'); if (s.state) setPageState(s.state); } catch {}
  }, []);
  const setAndSave = (s) => {
    setPageState(s);
    try { localStorage.setItem('ascii-lens', JSON.stringify({ state: s })); } catch {}
  };

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const handleExport = () => {
    // In production, this builds the SVG — here it's a stub
    alert('SVG export would fire here — each ASCII character becomes a <text> element at its grid x,y position, preserving fill colour.');
  };

  const isActive = pageState === 'live' || pageState === 'upload';

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: nd.bg, overflow: 'hidden' }}>
      <Nav />

      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        {/* Sidebar always visible */}
        <Sidebar
          cols={cols} setCols={setCols}
          charSet={charSet} setCharSet={setCharSet}
          colorMode={colorMode} setColorMode={setColorMode}
          invert={invert} setInvert={setInvert}
          fontSize={fontSize} setFontSize={setFontSize}
          onExport={handleExport}
          state={pageState}
          onAllow={() => setAndSave('live')}
          onUpload={() => setAndSave('upload')}
        />

        {/* Main canvas area */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          {pageState === 'permission' && (
            <PermissionScreen onAllow={() => setAndSave('live')} onUpload={() => setAndSave('upload')} />
          )}
          {pageState === 'live' && (
            <>
              <div style={{ flex: 1, overflow: 'hidden', position: 'relative', background: nd.black }}>
                <AsciiCanvas cols={cols} charSet={charSet} colorMode={colorMode} invert={invert} active={true} />
                {/* Mirror badge */}
                <div style={{
                  position: 'absolute', top: 12, left: 12,
                  fontFamily: nd.mono, fontSize: 9, color: nd.textDisabled,
                  letterSpacing: '0.07em', textTransform: 'uppercase',
                  background: 'rgba(0,0,0,0.6)', padding: '3px 8px',
                  border: `1px solid ${nd.border}`,
                }}>⟺ MIRRORED</div>
              </div>
              <StatusBar cols={cols} charSet={charSet} colorMode={colorMode} fps={fps} />
            </>
          )}
          {pageState === 'upload' && (
            <UploadScreen onActivate={() => setAndSave('live')} />
          )}
        </div>
      </div>

      {/* Tweaks */}
      {tweakOpen && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
          background: nd.surface, border: `1px solid ${nd.borderVisible}`,
          padding: 20, width: 220, display: 'flex', flexDirection: 'column', gap: 14,
        }}>
          <div style={{ fontFamily: nd.mono, fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: nd.textMid }}>Tweaks</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <Label>Page State</Label>
            {['permission','live','upload'].map(s => (
              <button key={s} onClick={() => setAndSave(s)} style={{
                fontFamily: nd.mono, fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.06em',
                padding: '6px 10px', border: `1px solid ${pageState === s ? nd.textPrimary : nd.border}`,
                background: 'transparent', color: pageState === s ? nd.textPrimary : nd.textSecondary, cursor: 'pointer',
              }}>{s}</button>
            ))}
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <Label>Char Set Quick Pick</Label>
            {CHAR_SETS.map(cs => (
              <button key={cs.id} onClick={() => setCharSet(cs)} style={{
                fontFamily: nd.mono, fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.06em',
                padding: '5px 10px', border: `1px solid ${charSet.id === cs.id ? nd.textPrimary : nd.border}`,
                background: 'transparent', color: charSet.id === cs.id ? nd.textPrimary : nd.textSecondary, cursor: 'pointer',
              }}>{cs.label}: {cs.chars}</button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
